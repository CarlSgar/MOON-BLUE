<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna Azul | Pijamas</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f8fb;
}

/* HEADER */
header {
    background: linear-gradient(90deg, #a8c9f0, #d6e6f9);
    text-align: center;
    padding: 20px;
}

/* BOTONES CATEGORÍAS */
.categorias {
    text-align: center;
    padding: 10px;
}

.categorias button {
    margin: 5px;
    padding: 10px;
    border: none;
    background: #1c3d5a;
    color: white;
    border-radius: 5px;
}

/* PRODUCTOS */
.productos {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    padding: 15px;
}

.card {
    background: white;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card-content {
    padding: 10px;
    text-align: center;
}

.btn {
    background: #25D366;
    color: white;
    padding: 8px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px;
    border-radius: 50%;
    text-decoration: none;
}
</style>
</head>

<body>

<header>
    <h1>LUNA AZUL</h1>
    <p>Catálogo de pijamas</p>
</header>

<!-- CATEGORÍAS -->
<div class="categorias">
    <button onclick="filtrar('todas')">Todas</button>
    <button onclick="filtrar('damas')">Damas</button>
    <button onclick="filtrar('caballeros')">Caballeros</button>
    <button onclick="filtrar('niñas')">Niñas</button>
    <button onclick="filtrar('niños')">Niños</button>
</div>

<section class="productos" id="productos"></section>

<a class="whatsapp" href="https://wa.me/573194474235">💬</a>

<script>

const productos = [
    {
        nombre: "Pijama Azul Mujer",
        precio: 60000,
        categoria: "damas",
        imagen: "https://via.placeholder.com/300x200?text=Damas"
    },
    {
        nombre: "Pijama Hombre Gris",
        precio: 65000,
        categoria: "caballeros",
        imagen: "https://via.placeholder.com/300x200?text=Caballeros"
    },
    {
        nombre: "Pijama Niña Rosa",
        precio: 55000,
        categoria: "niñas",
        imagen: "https://via.placeholder.com/300x200?text=Niña"
    },
    {
        nombre: "Pijama Niño Azul",
        precio: 55000,
        categoria: "niños",
        imagen: "https://via.placeholder.com/300x200?text=Niño"
    }
];

const contenedor = document.getElementById("productos");

function mostrar(lista) {
    contenedor.innerHTML = "";

    lista.forEach((p, i) => {
        const card = document.createElement("div");

        card.className = "card";
        card.innerHTML = `
        <img src="${p.imagen}">
        <div class="card-content">
            <h3>${p.nombre}</h3>
            <p>$${p.precio.toLocaleString()}</p>

            <label>Talla:</label>
            <select id="talla${i}">
                <option>S</option>
                <option>M</option>
                <option>L</option>
                <option>XL</option>
            </select>

            <br><br>

            <label>Cantidad:</label>
            <input type="number" id="cantidad${i}" value="1" min="1" style="width:60px;">

            <br><br>

            <button class="btn" onclick="comprar(${i})">Comprar</button>
        </div>
        `;

        contenedor.appendChild(card);
    });
}

function filtrar(cat) {
    if(cat === "todas") {
        mostrar(productos);
    } else {
        mostrar(productos.filter(p => p.categoria === cat));
    }
}

function comprar(i) {
    const p = productos[i];
    const talla = document.getElementById("talla"+i).value;
    const cantidad = document.getElementById("cantidad"+i).value;

    const mensaje = `Hola, quiero comprar:
Producto: ${p.nombre}
Talla: ${talla}
Cantidad: ${cantidad}`;

    window.open("https://wa.me/573194474235?text=" + encodeURIComponent(mensaje));
}

// Mostrar todo al inicio
mostrar(productos);

</script>

</body>
</html>
``
