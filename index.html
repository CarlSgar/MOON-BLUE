<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna Azul</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f8fb;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px;
    background: #a8c9f0;
}

/* CATEGORÍAS */
.categorias {
    text-align: center;
    margin: 10px;
}

.categorias button {
    padding: 10px;
    margin: 5px;
    border: none;
    background: #1c3d5a;
    color: white;
    border-radius: 5px;
}

/* PRODUCTOS */
.productos {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    padding: 10px;
}

.card {
    background: white;
    border-radius: 10px;
    padding: 10px;
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

/* FORMULARIO */
.formulario {
    padding: 20px;
    background: white;
}

input, select {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
}

.btn {
    background: #25D366;
    color: white;
    padding: 10px;
    border: none;
    width: 100%;
}
</style>
</head>

<body>

<header>
    <h1>LUNA AZUL</h1>
    <p>Pijamas para toda la familia</p>
</header>

<div class="categorias">
    <button onclick="filtrar('todas')">Todas</button>
    <button onclick="filtrar('damas')">Damas</button>
    <button onclick="filtrar('caballeros')">Caballeros</button>
    <button onclick="filtrar('niñas')">Niñas</button>
    <button onclick="filtrar('niños')">Niños</button>
</div>

<section class="productos" id="productos"></section>

<!-- FORMULARIO CLIENTE -->
<div class="formulario">
    <h2>Datos de entrega</h2>

    <input id="nombre" placeholder="Nombre completo">
    <input id="telefono" placeholder="Teléfono">
    <input id="ciudad" placeholder="Ciudad">
    <input id="direccion" placeholder="Dirección">

    <select id="pago">
        <option>Pago contra entrega</option>
        <option>Transferencia</option>
        <option>Nequi</option>
        <option>Daviplata</option>
    </select>

    <button class="btn" onclick="enviarPedido()">Finalizar compra</button>
</div>

<script>

let carrito = [];

const productos = [
    {nombre:"Pijama Dama 1", precio:60000, cat:"damas", img:"https://picsum.photos/200?1"},
    {nombre:"Pijama Dama 2", precio:62000, cat:"damas", img:"https://picsum.photos/200?2"},
    {nombre:"Pijama Dama 3", precio:65000, cat:"damas", img:"https://picsum.photos/200?3"},
    {nombre:"Pijama Dama 4", precio:68000, cat:"damas", img:"https://picsum.photos/200?4"},
    {nombre:"Pijama Dama 5", precio:70000, cat:"damas", img:"https://picsum.photos/200?5"},

    {nombre:"Pijama Hombre 1", precio:65000, cat:"caballeros", img:"https://picsum.photos/200?6"},
    {nombre:"Pijama Niño 1", precio:50000, cat:"niños", img:"https://picsum.photos/200?7"},
    {nombre:"Pijama Niña 1", precio:50000, cat:"niñas", img:"https://picsum.photos/200?8"}
];

function mostrar(lista){
    const cont = document.getElementById("productos");
    cont.innerHTML = "";

    lista.forEach((p,i)=>{
        cont.innerHTML += `
        <div class="card">
            <img src="${p.img}">
            <h4>${p.nombre}</h4>
            <p>$${p.precio}</p>

            <select id="talla${i}">
                <option>S</option>
                <option>M</option>
                <option>L</option>
            </select>

            <input type="number" id="cant${i}" value="1">

            <button onclick="agregar(${i})">Agregar</button>
        </div>`;
    });
}

function filtrar(cat){
    if(cat==="todas") mostrar(productos);
    else mostrar(productos.filter(p=>p.cat===cat));
}

function agregar(i){
    let p = productos[i];
    let talla = document.getElementById("talla"+i).value;
    let cant = document.getElementById("cant"+i).value;

    carrito.push({
        nombre:p.nombre,
        talla:talla,
        cantidad:cant
    });

    alert("Producto agregado ✅");
}

function enviarPedido(){

    let nombre = document.getElementById("nombre").value;
    let tel = document.getElementById("telefono").value;
    let ciudad = document.getElementById("ciudad").value;
    let dir = document.getElementById("direccion").value;
    let pago = document.getElementById("pago").value;

    let mensaje = "Pedido Luna Azul:%0A";

    carrito.forEach(p=>{
        mensaje += `${p.nombre} - Talla:${p.talla} Cantidad:${p.cantidad}%0A`;
    });

    mensaje += `%0ACliente:%0A${nombre}%0ATel:${tel}%0ACiudad:${ciudad}%0ADirección:${dir}%0APago:${pago}`;

    window.open("https://wa.me/573194474235?text="+mensaje);
}

// INICIAR
mostrar(productos);

</script>

</body>
</html>
