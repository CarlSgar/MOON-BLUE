<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna Azul | Pijamas</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f8fb;
}

/* HEADER */
header {
    background: linear-gradient(90deg, #a8c9f0, #d6e6f9);
    text-align: center;
    padding: 20px;
}

header h1 {
    margin: 0;
    color: #1c3d5a;
}

/* HERO */
.hero {
    text-align: center;
    padding: 20px;
}

.hero img {
    width: 90%;
    max-width: 400px;
    border-radius: 10px;
}

/* PRODUCTOS */
.productos {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
    text-align: center;
}

.price {
    font-weight: bold;
}

.btn {
    display: inline-block;
    margin-top: 10px;
    background: #25D366;
    color: white;
    padding: 10px;
    border-radius: 5px;
    text-decoration: none;
}

/* BENEFICIOS */
.beneficios {
    padding: 20px;
    text-align: center;
}

.beneficios h2 {
    color: #1c3d5a;
}

/* FOOTER */
footer {
    text-align: center;
    background: #a8c9f0;
    padding: 15px;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px;
    border-radius: 50%;
    text-decoration: none;
}
</style>

</head>

<body>

<header>
    <h1>LUNA AZUL</h1>
    <p>Pijamas cómodas para tu descanso</p>
</header>

<section class="hero">
    <h2>Catálogo</h2>
    https://via.placeholder.com/400x250?text=Luna+Azul
</section>

<section class="productos" id="productos"></section>

<section class="beneficios">
    <h2>¿Por qué elegirnos?</h2>
    <p>✅ Telas suaves y cómodas</p>
    <p>✅ Diseños modernos</p>
    <p>✅ Compra rápida por WhatsApp</p>
</section>

<footer>
    <p>📱 3194474235 | Instagram @luna_azulpijamas</p>
</footer>

<a class="whatsapp" href="https://wa.me/573194474235">💬</a>

<script>

const productos = [
    {
        nombre: "Pijama Azul",
        precio: 60000,
        imagen: "https://via.placeholder.com/300x200?text=Pijama+1"
    },
    {
        nombre: "Pijama Nube",
        precio: 65000,
        imagen: "https://via.placeholder.com/300x200?text=Pijama+2"
    },
    {
        nombre: "Pijama Estrella",
        precio: 70000,
        imagen: "https://via.placeholder.com/300x200?text=Pijama+3"
    }
];

const contenedor = document.getElementById("productos");

productos.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <img src="${p.imagen}">
        <div class="card-content">
            <h3>${p.nombre}</h3>
            <p class="price">$${p.precio.toLocaleString()}</p>
            <a class="btn" href="https://wa.me/573194474235?text=Hola quiero comprar ${p.nombre}">
                Comprar
            </a>
        </div>
    `;

    contenedor.appendChild(card);
});

</script>

</body>
</html>
